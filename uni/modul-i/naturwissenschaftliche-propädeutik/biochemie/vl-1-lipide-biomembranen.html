<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.min.css">
        <title>VL 1: Lipide, Biomembranen</title>

        <style>
            .gap {
                color: rgba(0, 0, 0, 0);
                border: 1px solid black;
                cursor: pointer;
                padding: 2px;
            }

            .gap-shown {
                color: inherit;
                border: 1px solid black;
                cursor: pointer;
                padding: 2px;
            }
        </style>
    </head>

    <body>
        <p>This is an <span class="gap">example</span> of a hidden thing.</p>


        <script>
            let gaps = document.getElementsByClassName("gap");
            for (let gap of gaps) {
                gap.addEventListener("click", event => {
                    gap.classList.toggle("gap");
                    gap.classList.toggle("gap-shown");
                });
            }
        </script>
    </body>

</html>
